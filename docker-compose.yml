services:
  # ─── Database ───────────────────────────────────────────
  paperless-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    mem_limit: 300m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: [infra, full]

  # ─── Cache ──────────────────────────────────────────────
  paperless-redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
    profiles: [infra, full]

  # ─── Document Management ────────────────────────────────
  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      paperless-db:
        condition: service_healthy
      paperless-redis:
        condition: service_healthy
    volumes:
      - ./data/paperless/media:/usr/src/paperless/media
      - ./data/paperless/data:/usr/src/paperless/data
      - ./data/paperless/consume:/usr/src/paperless/consume
      - ./data/paperless/export:/usr/src/paperless/export
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_OCR_LANGUAGE: spa+eng
      PAPERLESS_TIME_ZONE: Europe/Madrid
      PAPERLESS_URL: ${PAPERLESS_URL:-http://localhost:8000}
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      PAPERLESS_TASK_WORKERS: 1
      PAPERLESS_THREADS_PER_WORKER: 1
      PAPERLESS_WEBSERVER_WORKERS: 1
      PAPERLESS_OCR_PAGES: 20
      PAPERLESS_CONVERT_MEMORY_LIMIT: 256
    mem_limit: 1200m
    profiles: [infra, full]

  # ─── Vector Search ──────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS: 1
    mem_limit: 350m
    profiles: [infra, full]

  # ─── Core Service (Node.js) ─────────────────────────────
  paperclaw-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - paperless
      - qdrant
    environment:
      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    mem_limit: 200m
    profiles: [full]

  # ─── OpenClaw Gateway ───────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    depends_on:
      - paperclaw-core
    volumes:
      - ./data/openclaw:/home/node/.openclaw
      - ./skills:/home/node/.openclaw/skills
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      PAPERCLAW_CORE_URL: http://paperclaw-core:8080
    mem_limit: 300m
    profiles: [full]
