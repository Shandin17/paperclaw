version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: ["infra", "full"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS:-changeme}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    profiles: ["infra", "full"]
    restart: unless-stopped
    volumes:
      - ./data/redis:/data

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    profiles: ["infra", "full"]
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      PAPERLESS_DBHOST: postgres
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DBPASS:-changeme}
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY:-changeme-long-random-string}
      PAPERLESS_OCR_LANGUAGE: spa+eng
      PAPERLESS_TIME_ZONE: Europe/Madrid
    volumes:
      - ./data/paperless/data:/usr/src/paperless/data
      - ./data/paperless/media:/usr/src/paperless/media
      - ./data/paperless/export:/usr/src/paperless/export

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["infra", "full"]
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage

  # ── PaperClaw Core ────────────────────────────────────────────
  paperclaw-core:
    build:
      context: ./core
      dockerfile: Dockerfile
    profiles: ["full"]
    restart: unless-stopped
    depends_on:
      - paperless
      - qdrant
    environment:
      PAPERLESS_URL: http://paperless:8000
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      QDRANT_URL: http://qdrant:6333
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_FAST: ${MODEL_FAST:-claude-haiku-4-5-20251001}
      MODEL_SMART: ${MODEL_SMART:-claude-sonnet-4-20250514}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      PORT: 8080
    mem_limit: 200m
